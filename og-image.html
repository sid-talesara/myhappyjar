<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap');

    body {
      width: 1200px;
      height: 630px;
      background: #FFFBF4;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
      overflow: hidden;
      position: relative;
    }

    /* Soft blobs */
    body::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, #FFDAB3 0%, transparent 70%);
      top: -100px; right: 200px;
      opacity: 0.5;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, #E8DCFF 0%, transparent 70%);
      bottom: -80px; left: 100px;
      opacity: 0.4;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      color: #8A6F5A;
      font-weight: 600;
    }
    .logo span { font-size: 1.4rem; }

    h1 {
      font-family: 'Lora', serif;
      font-size: 3.2rem;
      line-height: 1.15;
      color: #3D2C1E;
      max-width: 560px;
    }
    h1 em {
      font-style: italic;
      color: #C1803A;
    }

    p {
      font-size: 1.1rem;
      color: #8A6F5A;
      line-height: 1.6;
      max-width: 500px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #FFF1C1;
      color: #8A6F5A;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 50px;
      width: fit-content;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #3D2C1E;
      color: #FFFBF4;
      font-size: 1rem;
      font-weight: 500;
      padding: 14px 28px;
      border-radius: 50px;
      width: fit-content;
      margin-top: 4px;
    }

    .url {
      font-size: 0.85rem;
      color: #C1803A;
      margin-top: 4px;
    }

    .right {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .right img {
      width: 420px;
      mix-blend-mode: multiply;
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="logo"><span>🫙</span> My Happy Jar</div>
    <div class="badge">✨ Coming Soon</div>
    <h1>A tiny jar of <em>happy</em>,<br/>filled by you, daily.</h1>
    <p>Write one happy note a day. Fold it. Drop it in your jar.<br/>Watch your year fill up with good moments.</p>
    <div class="cta">Join the Waitlist →</div>
    <div class="url">myhappyjar.com</div>
  </div>
  <div class="right">
    <img src="images/generated-1775732250922.png" alt="Happy Jar" />
  </div>
</body>
</html>
